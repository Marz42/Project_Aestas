services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aestas
      POSTGRES_PASSWORD: aestas
      POSTGRES_DB: aestas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aestas -d aestas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aestas:aestas@postgres:5432/aestas
      DATABASE_URL_SYNC: postgresql+psycopg2://aestas:aestas@postgres:5432/aestas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aestas:aestas@postgres:5432/aestas
      DATABASE_URL_SYNC: postgresql+psycopg2://aestas:aestas@postgres:5432/aestas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  admin:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

  beat:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: celery -A app.workers.celery_app beat --loglevel=info
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://aestas:aestas@postgres:5432/aestas
      DATABASE_URL_SYNC: postgresql+psycopg2://aestas:aestas@postgres:5432/aestas
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started

volumes:
  postgres_data:
